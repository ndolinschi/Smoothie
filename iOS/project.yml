name: SmoothieiOS
options:
  bundleIdPrefix: dev.smoothie
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  SmoothieiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
      - path: Resources/PrivacyInfo.xcprivacy
    info:
      path: Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - fetch
          - remote-notification
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        CFBundleDisplayName: Smoothie
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.developer-tools
        NSCameraUsageDescription: "Used to scan a pairing QR code from the Smoothie menubar app, and to attach photos to your messages."
        NSMicrophoneUsageDescription: "Used to record short voice input that's transcribed into your message."
        NSSpeechRecognitionUsageDescription: "Smoothie transcribes your voice into the message field locally."
        NSPhotoLibraryUsageDescription: "Used to attach photos from your library to your message for the agent to analyze."
        NSLocalNetworkUsageDescription: "Smoothie pairs with the Smoothie app on your Mac over the local network or your tailnet. Nothing is uploaded to the cloud."
        CFBundleURLTypes:
          - CFBundleURLName: dev.smoothie.ios
            CFBundleURLSchemes:
              - smoothie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.smoothie.ios
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Resources/SmoothieiOS.entitlements
        FRAMEWORK_SEARCH_PATHS: $(inherited) "$(BUILT_PRODUCTS_DIR)"
        OTHER_LDFLAGS: $(inherited) -framework Shared
    dependencies:
      - target: SmoothieWidgetExt
    preBuildScripts:
      - script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        name: "Build Shared framework"
        inputFiles:
          - $(SRCROOT)/../shared/build.gradle.kts
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/Shared.framework

  SmoothieWidgetExt:
    type: app-extension
    platform: iOS
    sources:
      - path: SmoothieWidget
      - path: Sources/Widget
    info:
      path: SmoothieWidget/Info.plist
      properties:
        CFBundleDisplayName: Smoothie
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.smoothie.ios.widget
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Resources/SmoothieWidget.entitlements
        SKIP_INSTALL: "YES"
