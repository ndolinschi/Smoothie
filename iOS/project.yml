name: SmoothieiOS
options:
  bundleIdPrefix: dev.smoothie
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  SmoothieiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - fetch
          - remote-notification
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        CFBundleDisplayName: Smoothie
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: "Used to scan a pairing QR code shown by the Smoothie menubar app on your Mac."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.smoothie.ios
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        FRAMEWORK_SEARCH_PATHS: $(inherited) "$(BUILT_PRODUCTS_DIR)"
        OTHER_LDFLAGS: $(inherited) -framework Shared
    preBuildScripts:
      - script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        name: "Build Shared framework"
        inputFiles:
          - $(SRCROOT)/../shared/build.gradle.kts
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/Shared.framework
