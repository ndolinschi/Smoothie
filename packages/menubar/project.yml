name: SmoothieMenubar
options:
  bundleIdPrefix: dev.smoothie
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  SmoothieMenubar:
    type: application
    platform: macOS
    sources:
      - path: "Smoothie Menubar"
        excludes:
          - "Info.plist"
    info:
      path: "Smoothie Menubar/Info.plist"
      properties:
        LSUIElement: true
        CFBundleDisplayName: Smoothie Menubar
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.smoothie.menubar
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
