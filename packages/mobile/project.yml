name: Smoothie
options:
  bundleIdPrefix: dev.smoothie
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  Smoothie:
    type: application
    platform: iOS
    sources:
      - path: Smoothie
        excludes:
          - "Info.plist"
    resources:
      - path: Smoothie/Assets.xcassets
      - path: Smoothie/Preview Content
    info:
      path: Smoothie/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - fetch
          - remote-notification
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Smoothie
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UIUserInterfaceStyle: Dark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.smoothie.app
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_ASSET_PATHS: '"Smoothie/Preview Content"'
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        CODE_SIGN_STYLE: Automatic
