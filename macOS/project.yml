name: SmoothieMac
options:
  bundleIdPrefix: dev.smoothie
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  Hummingbird:
    url: https://github.com/hummingbird-project/hummingbird.git
    from: "2.13.0"

targets:
  SmoothieMac:
    dependencies:
      - package: Hummingbird
        product: Hummingbird
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources/Assets.xcassets
      # Safety + per-CLI system prompts. Bundled as a folder reference so
      # SafetyHost's `Bundle.main.resourceURL/prompts` lookup works in an
      # installed .app — without this, release builds silently ran every
      # agent with no safety rules (the dev fallback only finds prompts/
      # when the binary runs next to the repo checkout).
      - path: ../prompts
        type: folder
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Smoothie
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.smoothie.mac
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        FRAMEWORK_SEARCH_PATHS: $(inherited) "$(BUILT_PRODUCTS_DIR)"
        OTHER_LDFLAGS: $(inherited) -framework Shared
    preBuildScripts:
      - script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        name: "Build Shared framework"
        inputFiles:
          - $(SRCROOT)/../shared/build.gradle.kts
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/Shared.framework
